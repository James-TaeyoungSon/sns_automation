name: 4. Notion URL to Threads

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Generate Notion draft only, without publishing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  notion-to-threads:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish Notion rows to Threads
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          NOTION_PUBLISH_MODE: status
          NOTION_BATCH_LIMIT: 3
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/notion_threads_pipeline.py --dry-run
          else
            python scripts/notion_threads_pipeline.py
          fi
